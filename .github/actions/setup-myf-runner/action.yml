# Shared runner setup for ui-myfinance work: resolve Node from `.nvmrc`, write a
# GitHub Packages-scoped npm userconfig, and run `npm ci`. Used by `run-codegen`
# and `verify-agent-output` in sync-myfinance-schemas.yml; consolidating here
# guarantees both jobs stay in lockstep when scope handling or auth needs change.
name: Setup ui-myfinance runner
description: Resolve Node, configure GitHub Packages npm auth (Maersk scopes), npm ci.

inputs:
  working-directory:
    description: Directory containing the ui-myfinance checkout.
    required: true
  gh-token:
    description: GitHub PAT with Packages:Read on every Maersk-Global repo publishing a package consumed by ui-myfinance.
    required: true

runs:
  using: composite
  steps:
    - name: Resolve Node version
      id: nodever
      shell: bash
      env:
        WORK_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # Honour ui-myfinance's pinned Node when present; fall back to LTS so a
        # missing .nvmrc doesn't silently break codegen on an unpinned major.
        if [ -f "${WORK_DIR}/.nvmrc" ]; then
          echo "version=$(cat "${WORK_DIR}/.nvmrc")" >> "$GITHUB_OUTPUT"
        else
          echo "version=lts/*" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ steps.nodever.outputs.version }}

    - name: Configure npm for GitHub Packages (Maersk scopes)
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        if [ -z "${NODE_AUTH_TOKEN}" ]; then
          echo "::error::gh-token input is empty — cannot authenticate to npm.pkg.github.com."
          exit 1
        fi
        NPMRC="${RUNNER_TEMP}/gh-packages.npmrc"
        # Do not use setup-node registry-url alone: ui-myfinance pulls both @maersk-global/*
        # and @Maersk-Global/* from GPR; one scope line can leave the other without a token.
        # ${NODE_AUTH_TOKEN} is expanded by npm from the environment (secret never echoed).
        {
          echo '@maersk-global:registry=https://npm.pkg.github.com'
          echo '@Maersk-Global:registry=https://npm.pkg.github.com'
          echo '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}'
        } > "$NPMRC"
        echo "NPM_CONFIG_USERCONFIG=$NPMRC" >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.gh-token }}
      run: npm ci
