# Required repository secrets:
#   CURSOR_API_KEY      — Cursor Cloud Agents API key (Integrations in Cursor dashboard).
#   MAERSK_SCHEMAS_PAT — Fine-grained GitHub PAT with:
#                          * Contents: Read on Maersk-Global/API-JSON-Schema-Definitions
#                          * Contents: Read + Write and Pull requests: Write on Maersk-Global/ui-myfinance
#                            (Write is required to push the pre-staged sync branch the Cloud Agent
#                            checks out, the runner-side codegen commit, and for split-into-prs to push
#                            child branches and open PRs via gh.)
#                          * Packages: Read on Maersk-Global/ui-myfinance **and on every other
#                            Maersk-Global repository that publishes a private npm package** pulled by
#                            ui-myfinance (for example the repo that publishes @Maersk-Global/vue-plugin-maerskvueapp).
#                            Omitting a publisher repo yields HTTP 403 from npm.pkg.github.com with
#                            GitHub’s message that the token does not match expected scopes — that is
#                            missing registry permission on that package source, not a Cursor issue.
#                            (Classic PAT alternative: read:packages for the org.)
#                          * If the org enforces SAML SSO: authorize the PAT for the org in GitHub
#                            (Fine-grained PAT → SSO → Configure SSO) or installs keep failing with 403.
#                        ui-myfinance has no checked-in .npmrc; GPR auth is the runner userconfig plus
#                        NODE_AUTH_TOKEN only — HTTP 403 on npm.pkg.github.com is then PAT/SSO/repo access.
#                        The PAT is consumed exclusively by GitHub-hosted runners; it is never passed to
#                        the Cursor cloud agent, never written into any committed file, and never sent
#                        in the agent prompt. The cloud agent runs without registry credentials.
# Add with: gh secret set CURSOR_API_KEY --repo <owner/repo>
#           gh secret set MAERSK_SCHEMAS_PAT --repo <owner/repo>
#
# Verify Cursor GitHub App can access ui-myfinance (Cloud Agents need this; PAT alone is not enough):
#   curl -sS https://api.cursor.com/v1/repositories -u "$CURSOR_API_KEY:" \
#     | jq '.items[] | select(.url | contains("ui-myfinance"))'
#
# For auto-created PRs, the Cursor GitHub App must also be allowed to push a branch and open
# pull requests on Maersk-Global/ui-myfinance (not read-only).
#
# The Cloud Agent must use repos[].url = ui-myfinance. If you pass github.repository here,
# the agent runs against this automation repo and any PR opens there — not in ui-myfinance.
#
# PR creation: autoCreatePR opens a GitHub PR only after the Cloud Agent run reaches FINISHED.
# If the run ends in ERROR (wrong startingRef, push denied, etc.), no PR appears — check the agent URL.
#
# When split_into_pr_per_schema is true and schema is "(all)", autoCreatePR is false and the
# split-into-prs job opens an umbrella PR (default <- staged branch) plus one PR per Conventional
# Commit scope (staged <- child branch) using cherry-picks.

name: Sync myfinance schemas (Cursor agent)

# One in-flight run per workflow; additional triggers queue until the active run
# finishes (unless a run is manually cancelled). Does not cancel an older run.
concurrency:
  group: sync-myfinance-schemas
  cancel-in-progress: false

# All cross-repo writes (push to ui-myfinance, gh pr create) flow through
# MAERSK_SCHEMAS_PAT, not GITHUB_TOKEN. Drop GITHUB_TOKEN to read-only on this
# repo so a compromised step cannot write back here or open PRs in this repo.
permissions:
  contents: read

# Centralised so a future fork or rename of either upstream repo touches one
# location instead of ten. The values are still hardcoded — these names rarely
# change — but every step now reads $API_REPO / $UI_REPO instead of inlining.
env:
  API_REPO: Maersk-Global/API-JSON-Schema-Definitions
  UI_REPO: Maersk-Global/ui-myfinance

on:
  workflow_dispatch:
    inputs:
      schema:
        description: "Drifted schema YAML to process. Pick '(all)' to adapt every drifted file in one run."
        type: choice
        default: "(all)"
        options:
          - "(all)"
          - myfinance-invoices-API.v1.yml
          - myfinance-invoices-API.v2.yaml
          - myfinance-submit-proof-of-payment-API.v1.yaml
          - myfinance-export-documents-API.v1.yml
          - myfinance-refund-request-API.v1.yaml
          - myfinance-estatements-API.v1.yml
          - myfinance-workflows-API.v1.yaml
      split_into_pr_per_schema:
        description: "Open one PR per drifted schema (umbrella + N children). Only effective when 'schema' is '(all)'; ignored otherwise. Same agent token cost; PRs split deterministically afterwards."
        type: boolean
        default: true
      model:
        description: "Cursor cloud-agent model. Pick '(default)' to use the org default."
        type: choice
        default: composer-2
        options:
          - "(default)"
          - claude-4.5-opus-high
          - claude-4.5-sonnet
          - claude-4-opus-thinking
          - claude-4-sonnet-thinking
          - composer-2
          - gpt-5-codex-high
jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Deterministic pre-flight gate.
  # Clones API-JSON-Schema-Definitions (org-private) and sparse-checks out
  # ui-myfinance/schemas/, diffs tracked YAMLs, and emits a JSON change list.
  # When drift exists, pushes sync/myfinance-schemas-<sha> to ui-myfinance
  # so the Cloud Agent never clones the API repo.
  # If nothing drifted the workflow ends here — zero Cursor tokens spent.
  # ──────────────────────────────────────────────────────────────────────
  detect-drift:
    name: Detect schema drift (no agent)
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
      changed_files: ${{ steps.diff.outputs.changed_files }}
      selected_schemas: ${{ steps.diff.outputs.selected_schemas }}
      all_slugs: ${{ steps.diff.outputs.all_slugs }}
      source_sha: ${{ steps.diff.outputs.source_sha }}
      base_ref: ${{ steps.diff.outputs.base_ref }}
      staged_branch: ${{ steps.diff.outputs.staged_branch }}
      # Set by the "Detect breaking changes" step. breaking_changes is a JSON
      # object keyed by local schema filename → array of oasdiff records.
      # total_breaking is an integer used to drive umbrella-PR labelling.
      breaking_changes: ${{ steps.breaking.outputs.breaking_changes }}
      total_breaking: ${{ steps.breaking.outputs.total_breaking }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone API schema source (org-private)
        env:
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${API_REPO}" \
            /tmp/api-src

      - name: Sparse-checkout ui-myfinance/schemas
        env:
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}" \
            /tmp/ui-src
          git -C /tmp/ui-src sparse-checkout set schemas

      - name: Compute drift
        id: diff
        env:
          SCHEMA_INPUT: ${{ inputs.schema }}
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
        run: |
          set -euo pipefail
          SRC=/tmp/api-src
          UI_SRC=/tmp/ui-src
          SOURCE_SHA=$(git -C "$SRC" rev-parse HEAD)

          # Mapping comes from the single source-of-truth TSV checked into this repo.
          # See scripts/myfinance-schema-map.tsv for column docs and add-a-schema instructions.
          MAP_FILE="$GITHUB_WORKSPACE/scripts/myfinance-schema-map.tsv"
          if [ ! -f "$MAP_FILE" ]; then
            echo "::error::Schema map file missing: $MAP_FILE"
            exit 1
          fi

          declare -A SLUG_BY_LOCAL
          MAPPING=""
          ALL_SLUGS='[]'
          while IFS=$'\t' read -r remote_rel local_name slug _codegen; do
            [ -z "${remote_rel:-}" ] && continue
            case "$remote_rel" in \#*) continue ;; esac
            MAPPING+="${remote_rel}"$'\t'"${local_name}"$'\n'
            SLUG_BY_LOCAL["$local_name"]="$slug"
            ALL_SLUGS=$(echo "$ALL_SLUGS" | jq --arg s "$slug" '. + [$s]')
          done < "$MAP_FILE"
          ALL_SLUGS=$(echo "$ALL_SLUGS" | jq 'unique')
          # all_slugs is the closed set of allowed Conventional Commit scopes
          # consumed by split-into-prs to validate agent commits.
          echo "all_slugs=$(echo "$ALL_SLUGS" | jq -c '.')" >> "$GITHUB_OUTPUT"

          CHANGES='[]'

          while IFS=$'\t' read -r remote_rel local_name; do
            [ -z "${remote_rel:-}" ] && continue

            # Honour schema filter (exact local filename) when not "(all)"
            if [ "$SCHEMA_INPUT" != "(all)" ] && [ "$local_name" != "$SCHEMA_INPUT" ]; then
              continue
            fi

            remote_path="$SRC/$remote_rel"
            local_path="$UI_SRC/schemas/$local_name"

            if [ ! -f "$remote_path" ]; then
              # Remote file was removed — local schema should be deleted
              if [ -f "$local_path" ]; then
                CHANGES=$(echo "$CHANGES" | jq --arg r "$remote_rel" --arg l "$local_name" \
                  '. + [{"remote": $r, "local": $l, "status": "deleted"}]')
              fi
            elif [ ! -f "$local_path" ]; then
              # Remote file exists but local does not — new schema
              CHANGES=$(echo "$CHANGES" | jq --arg r "$remote_rel" --arg l "$local_name" \
                '. + [{"remote": $r, "local": $l, "status": "added"}]')
            elif ! diff -q "$remote_path" "$local_path" >/dev/null 2>&1; then
              # Both exist but content differs — modified
              CHANGES=$(echo "$CHANGES" | jq --arg r "$remote_rel" --arg l "$local_name" \
                '. + [{"remote": $r, "local": $l, "status": "modified"}]')
            fi
          done <<< "$MAPPING"

          TOTAL=$(echo "$CHANGES" | jq 'length')

          if [ "$TOTAL" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'selected_schemas=[]' >> "$GITHUB_OUTPUT"
            {
              echo "## No schema drift detected"
              echo ""
              echo "Source SHA: \`$SOURCE_SHA\`"
              echo ""
              echo "_The Cursor agent was NOT launched. Zero tokens spent._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          SELECTED_SCHEMAS='[]'
          while IFS= read -r row; do
            local_name=$(echo "$row" | jq -r .local)
            slug="${SLUG_BY_LOCAL[$local_name]:-}"
            if [ -z "$slug" ]; then
              echo "::error::No slug mapped for $local_name in scripts/myfinance-schema-map.tsv"
              exit 1
            fi
            SELECTED_SCHEMAS=$(echo "$SELECTED_SCHEMAS" | jq --arg s "$slug" '. + [$s]')
          done < <(echo "$CHANGES" | jq -c '.[]')
          SELECTED_SCHEMAS=$(echo "$SELECTED_SCHEMAS" | jq 'unique')

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "changed_files=$(echo "$CHANGES" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "selected_schemas=$(echo "$SELECTED_SCHEMAS" | jq -c '.')" >> "$GITHUB_OUTPUT"

          ADDED=$(echo "$CHANGES"   | jq '[.[] | select(.status == "added")]   | length')
          MODIFIED=$(echo "$CHANGES" | jq '[.[] | select(.status == "modified")] | length')
          DELETED=$(echo "$CHANGES"  | jq '[.[] | select(.status == "deleted")]  | length')

          {
            echo "## Schema drift detected"
            echo ""
            echo "Source SHA: \`$SOURCE_SHA\`"
            echo ""
            echo "**Schema scope:** \`$SCHEMA_INPUT\`"
            echo ""
            echo "**Slugs for split / commits:** \`$(echo "$SELECTED_SCHEMAS" | jq -c .)\`"
            echo ""
            echo "**Added ($ADDED)**"
            echo "$CHANGES" | jq -r '.[] | select(.status == "added")   | "- `\(.local)` ← \(.remote)"'
            echo ""
            echo "**Modified ($MODIFIED)**"
            echo "$CHANGES" | jq -r '.[] | select(.status == "modified") | "- `\(.local)` ← \(.remote)"'
            echo ""
            echo "**Deleted ($DELETED)**"
            echo "$CHANGES" | jq -r '.[] | select(.status == "deleted")  | "- `\(.local)`"'
          } >> "$GITHUB_STEP_SUMMARY"

          # Base ref for ui-myfinance (fork point for the staged branch)
          BASE_REF=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${UI_REPO}" \
            | jq -er .default_branch)
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

          SHORT_SHA="${SOURCE_SHA:0:7}"
          STAGE_BRANCH="sync/myfinance-schemas-${SHORT_SHA}"

          rm -rf /tmp/ui-stage
          git clone --depth=1 -b "$BASE_REF" \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}" \
            /tmp/ui-stage
          git -C /tmp/ui-stage config user.email "github-actions[bot]@users.noreply.github.com"
          git -C /tmp/ui-stage config user.name "github-actions[bot]"
          git -C /tmp/ui-stage checkout -b "$STAGE_BRANCH"

          while IFS= read -r row; do
            status=$(echo "$row" | jq -r .status)
            remote_rel=$(echo "$row" | jq -r .remote)
            local_name=$(echo "$row" | jq -r .local)
            case "$status" in
              added|modified)
                mkdir -p /tmp/ui-stage/schemas
                cp "$SRC/$remote_rel" "/tmp/ui-stage/schemas/$local_name"
                ;;
              deleted)
                if [ -f "/tmp/ui-stage/schemas/$local_name" ]; then
                  git -C /tmp/ui-stage rm -f "schemas/$local_name"
                fi
                ;;
            esac
          done < <(echo "$CHANGES" | jq -c '.[]')

          git -C /tmp/ui-stage add schemas/
          git -C /tmp/ui-stage commit -m "chore(schemas): sync myfinance YAMLs from API repo @ ${SOURCE_SHA}"
          git -C /tmp/ui-stage remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}.git"
          # The shallow clone only knows BASE_REF, so --force-with-lease has no
          # recorded expectation for STAGE_BRANCH and fails with "stale info" if
          # the branch already exists on the remote (e.g., re-run with same
          # source SHA). Fetch the ref first; if it exists, pass the fetched
          # SHA as the explicit lease expectation; otherwise plain push.
          EXPECTED_SHA=""
          if git -C /tmp/ui-stage fetch origin "$STAGE_BRANCH" 2>/dev/null; then
            EXPECTED_SHA=$(git -C /tmp/ui-stage rev-parse FETCH_HEAD)
          fi
          if [ -n "$EXPECTED_SHA" ]; then
            git -C /tmp/ui-stage push \
              --force-with-lease="refs/heads/$STAGE_BRANCH:$EXPECTED_SHA" \
              origin "$STAGE_BRANCH"
          else
            git -C /tmp/ui-stage push origin "$STAGE_BRANCH"
          fi

          echo "staged_branch=$STAGE_BRANCH" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "**Pre-staged branch pushed:** \`$STAGE_BRANCH\` (Cloud Agent \`startingRef\`). Tip of branch will include the \`chore(schemas):\` commit plus a \`chore(codegen):\` commit pushed by the next job."
          } >> "$GITHUB_STEP_SUMMARY"

      # oasdiff classifies OpenAPI changes (removed properties, type narrowing,
      # required-ness flips, etc.) as breaking vs additive. Its output drives:
      #   - the umbrella PR body section (split-into-prs)
      #   - the breaking-change / additive-only umbrella PR label
      #   - the Cursor agent prompt (so the agent prioritises migrations over
      #     pure type updates for affected schemas)
      # See https://github.com/oasdiff/oasdiff for the CLI; pin VERSION below
      # to a known-stable release and bump it deliberately.
      - name: Install oasdiff
        if: steps.diff.outputs.has_changes == 'true'
        env:
          OASDIFF_VERSION: "1.10.25"
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          curl -fsSL "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$TMP"
          sudo install -m 0755 "$TMP/oasdiff" /usr/local/bin/oasdiff
          rm -rf "$TMP"
          oasdiff --version

      - name: Detect breaking changes
        id: breaking
        if: steps.diff.outputs.has_changes == 'true'
        env:
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
        run: |
          set -euo pipefail
          SRC=/tmp/api-src
          UI_SRC=/tmp/ui-src

          # JSON object keyed by local schema filename → array of oasdiff records.
          BREAKING_BY_SCHEMA='{}'
          TOTAL=0

          while IFS= read -r row; do
            status=$(echo "$row" | jq -r .status)
            local_name=$(echo "$row" | jq -r .local)
            remote_rel=$(echo "$row" | jq -r .remote)

            case "$status" in
              modified)
                old_path="$UI_SRC/schemas/$local_name"
                new_path="$SRC/$remote_rel"
                if [ ! -f "$old_path" ] || [ ! -f "$new_path" ]; then
                  echo "::warning::Missing input file(s) for oasdiff on $local_name; recording as undiagnosed."
                  ENTRY='[{"id":"oasdiff-unavailable","text":"could not run oasdiff: input file missing"}]'
                else
                  # --fail-on NONE keeps the exit code at 0 even when breaking
                  # changes are present; we read the JSON ourselves to decide.
                  # On parse failures (corrupt YAML, unsupported OpenAPI extension)
                  # oasdiff exits non-zero — fall back to a marker entry so the
                  # workflow continues and operators see the issue on the PR.
                  if ENTRY=$(oasdiff breaking "$old_path" "$new_path" --format json --fail-on NONE 2>/tmp/oasdiff.err); then
                    : # ENTRY contains JSON
                  else
                    ERR=$(tr -d '\n' < /tmp/oasdiff.err | head -c 240)
                    echo "::warning::oasdiff failed on $local_name: $ERR"
                    ENTRY=$(jq -n --arg t "oasdiff failed: $ERR" '[{"id":"oasdiff-failed","text":$t}]')
                  fi
                  # Normalise: oasdiff emits literal `null` when no breaking changes.
                  if [ -z "$ENTRY" ] || [ "$ENTRY" = "null" ]; then
                    ENTRY='[]'
                  fi
                fi
                ;;
              deleted)
                # Removing a tracked schema is unambiguously breaking; synthesise
                # one record so the PR label + body capture it without depending
                # on oasdiff (which has nothing on the "new" side to diff).
                ENTRY=$(jq -n --arg n "$local_name" \
                  '[{"id":"schema-deleted","text":("removed schema file " + $n)}]')
                ;;
              added)
                # New endpoints/properties are inherently non-breaking for callers.
                ENTRY='[]'
                ;;
              *)
                ENTRY='[]'
                ;;
            esac

            COUNT=$(echo "$ENTRY" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              BREAKING_BY_SCHEMA=$(echo "$BREAKING_BY_SCHEMA" \
                | jq --arg k "$local_name" --argjson v "$ENTRY" '. + { ($k): $v }')
              TOTAL=$((TOTAL + COUNT))
            fi
          done < <(echo "$CHANGED_FILES" | jq -c '.[]')

          echo "breaking_changes=$(echo "$BREAKING_BY_SCHEMA" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "total_breaking=$TOTAL" >> "$GITHUB_OUTPUT"

          {
            echo ""
            if [ "$TOTAL" -eq 0 ]; then
              echo "**Breaking changes:** none (all changes additive)."
            else
              echo "**Breaking changes detected ($TOTAL):**"
              echo ""
              while IFS= read -r sch; do
                echo "_${sch}_:"
                echo "$BREAKING_BY_SCHEMA" | jq -r --arg k "$sch" '.[$k][] | "- \(.text // .id)"'
                echo ""
              done < <(echo "$BREAKING_BY_SCHEMA" | jq -r 'keys[]')
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # Job 1b: Run codegen on the GitHub-hosted runner (NOT in the Cursor sandbox).
  # The Cursor cloud agent has no GitHub Packages credentials by design — registry
  # auth lives only on the runner via MAERSK_SCHEMAS_PAT (Packages: Read). This job
  # clones the staged branch, runs `npm ci`, executes the `npm run codegen-*` scripts
  # for each drifted schema, and appends a single `chore(codegen):` commit to the
  # staged branch. The Cursor agent later picks up the branch with both the schema
  # YAMLs and the regenerated client already in place, and never touches npm.
  # ──────────────────────────────────────────────────────────────────────
  run-codegen:
    name: Run codegen on runner (no agent secrets)
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Clone ui-myfinance at staged branch
        env:
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
        run: |
          set -euo pipefail
          git clone --depth=1 -b "$STAGED_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}" \
            ui-myfinance
          git -C ui-myfinance config user.email "github-actions[bot]@users.noreply.github.com"
          git -C ui-myfinance config user.name "github-actions[bot]"

      - uses: ./.github/actions/setup-myf-runner
        with:
          working-directory: ui-myfinance
          gh-token: ${{ secrets.MAERSK_SCHEMAS_PAT }}

      - name: Run codegen for drifted schemas
        working-directory: ui-myfinance
        env:
          CHANGED_FILES: ${{ needs.detect-drift.outputs.changed_files }}
          NODE_AUTH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
        run: |
          set -euo pipefail
          MAP_FILE="$GITHUB_WORKSPACE/scripts/myfinance-schema-map.tsv"
          if [ ! -f "$MAP_FILE" ]; then
            echo "::error::Schema map file missing: $MAP_FILE"
            exit 1
          fi

          declare -A CODEGEN_BY_LOCAL
          while IFS=$'\t' read -r _remote local_name _slug codegen; do
            [ -z "${local_name:-}" ] && continue
            case "${_remote}" in \#*) continue ;; esac
            CODEGEN_BY_LOCAL["$local_name"]="$codegen"
          done < "$MAP_FILE"

          RAN=()
          while IFS= read -r row; do
            status=$(echo "$row" | jq -r .status)
            local_name=$(echo "$row" | jq -r .local)
            # Deleted schemas have nothing to (re)generate; UI removal is the agent's job.
            if [ "$status" = "deleted" ]; then
              continue
            fi
            script="${CODEGEN_BY_LOCAL[$local_name]:-}"
            if [ -z "$script" ]; then
              echo "::warning::No codegen script mapped for $local_name in scripts/myfinance-schema-map.tsv; skipping"
              continue
            fi
            echo "=== npm run $script (for $local_name) ==="
            npm run "$script"
            RAN+=("$script")
          done < <(echo "$CHANGED_FILES" | jq -c '.[]')

          echo "Codegen scripts executed: ${RAN[*]:-<none>}"

      - name: Guard against credential leakage into working tree
        working-directory: ui-myfinance
        run: |
          set -euo pipefail
          # Defence in depth: auth lives in $RUNNER_TEMP npm userconfig, but a buggy
          # codegen script could conceivably write a token-bearing file into the
          # working tree. Fail loudly before we even consider staging.
          LEAKED=$(git status --porcelain | awk '{print $2}' | grep -E '(^|/)\.npmrc$|(^|/)\.env(\..+)?$' || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Credential-shaped file detected in working tree after codegen: $LEAKED"
            exit 1
          fi

      - name: Commit and push generated output
        working-directory: ui-myfinance
        env:
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          SOURCE_SHA: ${{ needs.detect-drift.outputs.source_sha }}
        run: |
          set -euo pipefail
          git add -A
          # Final assertion: even if `git add` somehow staged a credential file
          # (path masking, alias, etc.), refuse to commit.
          STAGED_LEAK=$(git diff --cached --name-only | grep -E '(^|/)\.npmrc$|(^|/)\.env(\..+)?$' || true)
          if [ -n "$STAGED_LEAK" ]; then
            echo "::error::Refusing to commit credential-shaped file(s): $STAGED_LEAK"
            exit 1
          fi
          if git diff --cached --quiet; then
            # Codegen producing nothing for a drift event is unusual — either the
            # scripts are no-ops, or the generated output already matched what
            # was in the staged checkout (only possible on a re-run). Either way,
            # surface and continue without an empty commit.
            echo "::warning::Codegen produced no working-tree changes; skipping commit."
            exit 0
          fi
          git commit -m "chore(codegen): regenerate clients for myfinance schemas @ ${SOURCE_SHA}"
          # The concurrency group serialises sync runs, so the staged branch tip
          # should still equal what we cloned. --force-with-lease guards against
          # an out-of-band push between clone and now (e.g., operator override).
          EXPECTED_SHA=$(git rev-parse HEAD~1)
          git push \
            --force-with-lease="refs/heads/$STAGED_BRANCH:$EXPECTED_SHA" \
            origin "$STAGED_BRANCH"

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Launch the Cursor Cloud Agent.
  # Only runs when detect-drift found at least one changed file.
  # Embeds the pre-computed change list and source SHA into the prompt
  # so the agent skips re-enumeration entirely.
  # Split into discrete steps (build prompt / create / poll / resolve / summary)
  # so the Actions UI attributes failures to the actual sub-task.
  # ──────────────────────────────────────────────────────────────────────
  launch-agent:
    name: Launch Cursor agent
    runs-on: ubuntu-latest
    # Depend on run-codegen so the agent only launches after generated clients
    # are committed on the staged branch. If run-codegen fails (codegen error,
    # registry auth issue), the agent is never invoked — saves Cursor tokens and
    # keeps the failure signal where the root cause actually is.
    needs: [detect-drift, run-codegen]
    if: needs.detect-drift.outputs.has_changes == 'true'
    outputs:
      agent_branch: ${{ steps.resolve-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4

      - name: Build agent prompt
        env:
          SCHEMA: ${{ inputs.schema }}
          SPLIT_INTO_PR_PER_SCHEMA: ${{ inputs.split_into_pr_per_schema }}
          SELECTED_SCHEMAS: ${{ needs.detect-drift.outputs.selected_schemas }}
          ACTOR: ${{ github.actor }}
          CHANGED_FILES: ${{ needs.detect-drift.outputs.changed_files }}
          SOURCE_SHA: ${{ needs.detect-drift.outputs.source_sha }}
          # detect-drift emits an empty object when nothing is breaking;
          # envsubst on `{}` is harmless. The prompt instructs the agent how
          # to read this for migration prioritisation.
          BREAKING_CHANGES: ${{ needs.detect-drift.outputs.breaking_changes }}
        run: |
          set -euo pipefail
          # Allowlist the variables we actually template into the prompt; without
          # this, any `$IDENT` later added to the markdown (e.g. inside a code
          # block illustrating a shell command) would be silently consumed.
          PROMPT=$(envsubst \
            '$SCHEMA $SPLIT_INTO_PR_PER_SCHEMA $SELECTED_SCHEMAS $ACTOR $CHANGED_FILES $SOURCE_SHA $BREAKING_CHANGES' \
            < .cursor/prompts/sync-myfinance-schemas.md)
          # Write to a file — do not pass the prompt via GITHUB_OUTPUT or inline
          # workflow expressions into the next step's shell; JSON/markdown/newlines/braces
          # break the runner script if inlined.
          printf '%s\n' "$PROMPT" > "$RUNNER_TEMP/agent-prompt.txt"

      - name: Create Cursor agent
        id: create-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          SPLIT_PR: ${{ inputs.split_into_pr_per_schema }}
          SCHEMA_IN: ${{ inputs.schema }}
          MODEL_INPUT: ${{ inputs.model }}
        run: |
          set -euo pipefail

          AUTO_CREATE_PR=true
          if [ "${SPLIT_PR}" = "true" ] && [ "${SCHEMA_IN}" = "(all)" ]; then
            AUTO_CREATE_PR=false
            echo "split_into_pr_per_schema: disabling Cursor autoCreatePR (split-into-prs will open PRs)."
          fi

          ACP_JSON=true
          [ "$AUTO_CREATE_PR" = "false" ] && ACP_JSON=false

          # Build the POST body on disk; piping a large rawfile prompt through
          # echo | jq breaks for prompts containing certain control sequences.
          jq -n \
            --rawfile text "$RUNNER_TEMP/agent-prompt.txt" \
            --arg repo "https://github.com/${UI_REPO}" \
            --arg ref "$STAGED_BRANCH" \
            --argjson acp "$ACP_JSON" \
            '{
              prompt: { text: $text },
              repos: [{ url: $repo, startingRef: $ref }],
              autoCreatePR: $acp
            }' > "$RUNNER_TEMP/create-agent-body.json"

          if [ "${MODEL_INPUT}" != "(default)" ] && [ -n "${MODEL_INPUT}" ]; then
            jq --arg m "${MODEL_INPUT}" '. + { model: { id: $m } }' \
              "$RUNNER_TEMP/create-agent-body.json" > "$RUNNER_TEMP/create-agent-body.json.tmp"
            mv "$RUNNER_TEMP/create-agent-body.json.tmp" "$RUNNER_TEMP/create-agent-body.json"
          fi

          jq -e . "$RUNNER_TEMP/create-agent-body.json" >/dev/null
          echo "Create-agent POST body top-level keys: $(jq -c 'keys | sort' "$RUNNER_TEMP/create-agent-body.json")"

          # Retry only on transient failures (network errors, 5xx, 429). 4xx
          # responses indicate a bad payload and will not become valid by
          # waiting; surface those immediately.
          HTTP_CODE=""
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -sS -o "$RUNNER_TEMP/create-agent.json" -w "%{http_code}" -X POST https://api.cursor.com/v1/agents \
              -u "${CURSOR_API_KEY}:" \
              -H 'Content-Type: application/json' \
              --data-binary @"$RUNNER_TEMP/create-agent-body.json" || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              break
            fi
            case "$HTTP_CODE" in
              000|429|5??)
                BACKOFF=$((attempt * 5))
                echo "Cursor POST /v1/agents returned HTTP $HTTP_CODE on attempt $attempt; retrying in ${BACKOFF}s"
                sleep "$BACKOFF"
                ;;
              *)
                break
                ;;
            esac
          done

          jq . "$RUNNER_TEMP/create-agent.json"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Cursor POST /v1/agents failed with HTTP $HTTP_CODE after retries"
            echo "Request top-level keys (for support / debugging): $(jq -c 'keys | sort' "$RUNNER_TEMP/create-agent-body.json")"
            exit 1
          fi

          AGENT_ID=$(jq -r '.agent.id' "$RUNNER_TEMP/create-agent.json")
          RUN_ID=$(jq -r '.run.id' "$RUNNER_TEMP/create-agent.json")
          AGENT_URL=$(jq -r '.agent.url // "unknown"' "$RUNNER_TEMP/create-agent.json")
          # branchName is NOT populated at POST time — the agent is in status
          # CREATING and Cursor only assigns a working branch once the run has
          # actually checked out source. Capture whatever is there now (usually
          # empty); we re-resolve it after the polling loop reaches FINISHED.
          INITIAL_BRANCH=$(jq -r '.agent.branchName // empty' "$RUNNER_TEMP/create-agent.json")

          echo "agent_id=$AGENT_ID" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "agent_url=$AGENT_URL" >> "$GITHUB_OUTPUT"
          echo "initial_branch=$INITIAL_BRANCH" >> "$GITHUB_OUTPUT"
          echo "auto_create_pr=$AUTO_CREATE_PR" >> "$GITHUB_OUTPUT"

      - name: Poll Cursor run until terminal
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_ID: ${{ steps.create-agent.outputs.agent_id }}
          RUN_ID: ${{ steps.create-agent.outputs.run_id }}
          AGENT_URL: ${{ steps.create-agent.outputs.agent_url }}
          AUTO_CREATE_PR: ${{ steps.create-agent.outputs.auto_create_pr }}
        run: |
          set -euo pipefail
          # Poll until a terminal status; overall wall clock is bounded by the runner job timeout.
          # Cadence scales with elapsed time so a quick FINISHED/ERROR is observed within seconds
          # while long-running cases don't burn API calls every 30s for an hour.
          START=$(date +%s)
          while true; do
            RUN_JSON=$(curl -sS -u "${CURSOR_API_KEY}:" \
              "https://api.cursor.com/v1/agents/${AGENT_ID}/runs/${RUN_ID}")
            STATUS=$(echo "$RUN_JSON" | jq -r .status)
            echo "Cursor run status: $STATUS"
            case "$STATUS" in
              FINISHED)
                if [ "$AUTO_CREATE_PR" = "true" ]; then
                  echo "Run FINISHED — if GitHub allows it, Cursor opens the PR after this point."
                else
                  echo "Run FINISHED — split-into-prs job will open umbrella + per-scope PRs."
                fi
                # Persist the final run JSON for the resolve-branch step.
                printf '%s' "$RUN_JSON" > "$RUNNER_TEMP/run-final.json"
                break
                ;;
              ERROR|CANCELLED|EXPIRED)
                echo "::error::Cursor run ended with status=$STATUS (no PR). Open the agent for logs: $AGENT_URL"
                exit 1
                ;;
              *)
                ELAPSED=$(( $(date +%s) - START ))
                if [ "$ELAPSED" -lt 300 ]; then
                  sleep 20
                else
                  sleep 60
                fi
                ;;
            esac
          done

      - name: Resolve agent branch
        id: resolve-branch
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
          AGENT_ID: ${{ steps.create-agent.outputs.agent_id }}
          INITIAL_BRANCH: ${{ steps.create-agent.outputs.initial_branch }}
          AGENT_URL: ${{ steps.create-agent.outputs.agent_url }}
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
        run: |
          set -euo pipefail
          # Resolve branchName now that the run has FINISHED. Cursor's API has
          # been observed to push the agent's branch to ui-myfinance without
          # populating any branchName field in the agent/run payloads, so we
          # cascade through three sources:
          #   1. Run JSON saved by poll step (.branchName, .agent.branchName)
          #   2. Fresh GET /v1/agents/{id} (.agent.branchName, .branchName)
          #   3. GitHub branch search: list cursor/* branches on ui-myfinance
          #      and pick the one whose tip is 'ahead' of staged_branch. Since
          #      staged_branch is unique per source SHA, only the current run's
          #      agent branch can compare as ahead — older cursor/* branches
          #      forked from prior staged refs will compare as diverged/behind.
          BRANCH="$INITIAL_BRANCH"

          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            BRANCH=$(jq -r '.branchName // .agent.branchName // empty' "$RUNNER_TEMP/run-final.json")
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            curl -sS -o "$RUNNER_TEMP/agent.json" -u "${CURSOR_API_KEY}:" \
              "https://api.cursor.com/v1/agents/${AGENT_ID}" || true
            BRANCH=$(jq -r '.agent.branchName // .branchName // empty' "$RUNNER_TEMP/agent.json" 2>/dev/null || echo "")
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            echo "Cursor API did not expose branchName; falling back to GitHub branch search."
            # Diagnostic dumps so a future regression can be triaged without re-dispatching.
            echo "--- Final run JSON ---"
            jq . "$RUNNER_TEMP/run-final.json"
            echo "--- Final agent JSON ---"
            jq . "$RUNNER_TEMP/agent.json" 2>/dev/null || echo "(no agent.json captured)"
            echo "--- end diagnostic ---"

            # List cursor/* branches and find one ahead of the staged branch.
            # Pagination caps at 100/page; ui-myfinance is unlikely to have
            # thousands of stale cursor/* branches, but if it does, the loop
            # still terminates on the first 'ahead' match.
            CANDIDATES=$(gh api "repos/${UI_REPO}/branches" --paginate \
              --jq '.[] | select(.name | startswith("cursor/")) | .name' 2>/dev/null || echo "")
            if [ -z "$CANDIDATES" ]; then
              echo "::warning::No cursor/* branches found on ${UI_REPO}."
            else
              echo "Candidate cursor/* branches on ${UI_REPO}:"
              echo "$CANDIDATES" | sed 's/^/  - /'
              while IFS= read -r candidate; do
                [ -z "$candidate" ] && continue
                STATUS=$(gh api "repos/${UI_REPO}/compare/${STAGED_BRANCH}...${candidate}" \
                  --jq '.status' 2>/dev/null || echo "")
                if [ "$STATUS" = "ahead" ]; then
                  BRANCH="$candidate"
                  echo "Resolved agent branch via GitHub: $BRANCH (ahead of $STAGED_BRANCH)"
                  break
                fi
              done <<< "$CANDIDATES"
            fi
          fi

          # Fail-closed: regardless of autoCreatePR, an unresolved branch means
          # verify-agent-output can't validate (it gates on this output) and any
          # PR Cursor opens would ship without runner-side typecheck + unit tests
          # — a real correctness gap. Error instead of warn-and-continue.
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            echo "::error::Run FINISHED but could not resolve the agent branch via Cursor API or GitHub fallback. The agent may have produced no commits — check the agent URL: $AGENT_URL"
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Write run summary
        env:
          AGENT_URL: ${{ steps.create-agent.outputs.agent_url }}
          RUN_ID: ${{ steps.create-agent.outputs.run_id }}
          AUTO_CREATE_PR: ${{ steps.create-agent.outputs.auto_create_pr }}
          BRANCH: ${{ steps.resolve-branch.outputs.branch }}
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          SOURCE_SHA: ${{ needs.detect-drift.outputs.source_sha }}
          CHANGED_FILES: ${{ needs.detect-drift.outputs.changed_files }}
        run: |
          set -euo pipefail
          FILE_COUNT=$(printf '%s' "$CHANGED_FILES" | jq 'length')
          {
            echo "### Cursor agent"
            echo "- Target repo (PR opens here): **${UI_REPO}**"
            echo "- Agent: $AGENT_URL"
            echo "- Run: \`$RUN_ID\`"
            echo "- Branch: \`$BRANCH\` (Cursor \`startingRef\`: \`$STAGED_BRANCH\`)"
            echo "- Source SHA (API schemas): \`$SOURCE_SHA\`"
            echo "- Files passed in: $FILE_COUNT YAML(s)"
            echo "- autoCreatePR: \`$AUTO_CREATE_PR\`"
            echo ""
            echo "_When autoCreatePR is true, PRs are created when the run completes successfully (FINISHED). If the run errors, check the agent URL above._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # Job 2b: Verify the agent's output by running typecheck + unit tests on
  # the runner. The Cursor agent has no registry credentials and cannot run
  # `npm ci`, so verification cannot live inside the agent — moving it here
  # is the security counterpart to moving codegen out. Failures hard-fail the
  # workflow run; branch protection (if configured) blocks merge of the PR.
  # ──────────────────────────────────────────────────────────────────────
  verify-agent-output:
    name: Verify agent output (typecheck + unit tests)
    runs-on: ubuntu-latest
    needs: [detect-drift, launch-agent]
    # launch-agent now fails closed when the agent branch is unresolved, so
    # a successful launch-agent guarantees a non-empty agent_branch output;
    # no separate guard for that here.
    if: |
      needs.detect-drift.outputs.has_changes == 'true' &&
      needs.launch-agent.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Clone ui-myfinance at agent branch
        env:
          GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
          AGENT_BRANCH: ${{ needs.launch-agent.outputs.agent_branch }}
        run: |
          set -euo pipefail
          git clone --depth=1 -b "$AGENT_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}" \
            ui-myfinance

      - uses: ./.github/actions/setup-myf-runner
        with:
          working-directory: ui-myfinance
          gh-token: ${{ secrets.MAERSK_SCHEMAS_PAT }}

      - name: Typecheck
        working-directory: ui-myfinance
        run: npm run typecheck

      - name: Unit tests
        working-directory: ui-myfinance
        run: npm run test:unit

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Deterministic PR split (no extra LLM). Cherry-picks agent commits
  # grouped by Conventional Commit scope onto child branches and opens PRs
  # with base = staged sync branch. Also ensures an umbrella PR exists:
  # default_branch <- staged_branch (schema YAML only on staged tip).
  # Split into named steps so checkout / umbrella-PR / cherry-pick failures
  # are attributed to the right phase in the Actions UI.
  # ──────────────────────────────────────────────────────────────────────
  split-into-prs:
    name: Split agent work into per-schema PRs
    runs-on: ubuntu-latest
    needs: [detect-drift, launch-agent]
    if: |
      needs.detect-drift.outputs.has_changes == 'true' &&
      needs.launch-agent.result == 'success' &&
      inputs.split_into_pr_per_schema == true &&
      inputs.schema == '(all)'
    env:
      GH_TOKEN: ${{ secrets.MAERSK_SCHEMAS_PAT }}
    steps:
      - name: Checkout ui-myfinance and verify branches
        id: checkout
        env:
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          AGENT_BRANCH: ${{ needs.launch-agent.outputs.agent_branch }}
        run: |
          set -euo pipefail
          rm -rf /tmp/ui-split
          git clone --no-single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}.git" \
            /tmp/ui-split
          cd /tmp/ui-split
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin "${STAGED_BRANCH}" "${AGENT_BRANCH}"
          if ! git rev-parse "origin/${STAGED_BRANCH}" >/dev/null 2>&1; then
            echo "::error::Staged branch origin/${STAGED_BRANCH} not found after fetch."
            exit 1
          fi
          if ! git rev-parse "origin/${AGENT_BRANCH}" >/dev/null 2>&1; then
            echo "::error::Agent branch origin/${AGENT_BRANCH} not found after fetch."
            exit 1
          fi

          STAGED_SHA=$(git rev-parse "origin/${STAGED_BRANCH}")
          AGENT_SHA=$(git rev-parse "origin/${AGENT_BRANCH}")

          echo "Staged: ${STAGED_BRANCH} @ ${STAGED_SHA}"
          echo "Agent:  ${AGENT_BRANCH} @ ${AGENT_SHA}"

          echo "staged_sha=$STAGED_SHA" >> "$GITHUB_OUTPUT"
          echo "agent_sha=$AGENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Ensure umbrella PR exists
        env:
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          BASE_REF: ${{ needs.detect-drift.outputs.base_ref }}
          SOURCE_SHA: ${{ needs.detect-drift.outputs.source_sha }}
          SELECTED_SCHEMAS: ${{ needs.detect-drift.outputs.selected_schemas }}
          BREAKING_CHANGES: ${{ needs.detect-drift.outputs.breaking_changes }}
          TOTAL_BREAKING: ${{ needs.detect-drift.outputs.total_breaking }}
        run: |
          set -euo pipefail

          # Render the breaking-changes section once; reuse for new PR body and
          # (when the umbrella already exists) to refresh its body.
          BREAKING_MD="$RUNNER_TEMP/breaking-section.md"
          : > "$BREAKING_MD"
          if [ "${TOTAL_BREAKING:-0}" -gt 0 ]; then
            LABEL="breaking-change"
            {
              echo "**Breaking changes detected (${TOTAL_BREAKING}):**"
              echo ""
              while IFS= read -r sch; do
                echo "_${sch}_:"
                echo "$BREAKING_CHANGES" | jq -r --arg k "$sch" '.[$k][] | "- \(.text // .id)"'
                echo ""
              done < <(echo "$BREAKING_CHANGES" | jq -r 'keys[]')
            } >> "$BREAKING_MD"
          else
            LABEL="additive-only"
            echo "**Breaking changes:** none (all changes additive)." >> "$BREAKING_MD"
          fi

          # Ensure both labels exist on ui-myfinance so --label below doesn't 422.
          # Idempotent: a missing-permission or already-exists case is non-fatal.
          gh label create breaking-change -R "${UI_REPO}" \
            --color 'D93F0B' \
            --description 'Sync includes one or more breaking schema changes (oasdiff).' 2>/dev/null || true
          gh label create additive-only -R "${UI_REPO}" \
            --color '0E8A16' \
            --description 'Sync is purely additive (oasdiff: no breaking changes).' 2>/dev/null || true

          # Check across all states (open, closed, merged). If a previous run created an
          # umbrella for the same staged branch and it was closed without merging — e.g.
          # operator cancelled mid-flight — gh pr create would otherwise fail the whole
          # split job. Reuse the existing PR record and warn instead of creating a duplicate.
          EXISTING=$(gh pr list -R "${UI_REPO}" --base "$BASE_REF" --head "$STAGED_BRANCH" --state all --json number,state -q '.[0]' || echo "")
          if [ -z "${EXISTING}" ]; then
            {
              echo "Automated schema sync from API-JSON-Schema-Definitions @ \`${SOURCE_SHA}\`."
              echo ""
              echo "Child PRs (one per Conventional Commit scope) target branch \`${STAGED_BRANCH}\` after the Cloud Agent run when **split_into_pr_per_schema** is enabled."
              echo ""
              echo "**Slugs in this run:** \`${SELECTED_SCHEMAS}\`"
              echo ""
              cat "$BREAKING_MD"
            } > "$RUNNER_TEMP/umbrella-body.md"
            gh pr create -R "${UI_REPO}" \
              --base "$BASE_REF" \
              --head "$STAGED_BRANCH" \
              --title "chore(schemas): sync myfinance YAMLs from API @ ${SOURCE_SHA}" \
              --label "$LABEL" \
              --body-file "$RUNNER_TEMP/umbrella-body.md"
          else
            EX_NUM=$(echo "$EXISTING" | jq -r '.number')
            EX_STATE=$(echo "$EXISTING" | jq -r '.state')
            echo "Umbrella PR for ${STAGED_BRANCH} already exists: #${EX_NUM} (state=${EX_STATE})"
            if [ "$EX_STATE" = "CLOSED" ]; then
              echo "::warning::Umbrella PR #${EX_NUM} was closed without merging. Reopen it manually if you intend to ship this sync, or delete branch ${STAGED_BRANCH} to start fresh."
            fi
            # Re-assert the correct label on re-runs. The breaking-change
            # verdict can flip between runs if the API team amends the schema,
            # so we add the current label and clear the opposite. Both gh
            # operations are tolerant of the label already being in the right
            # state; the `|| true` guards on the remove-label call ensure a
            # missing opposite label doesn't fail the step.
            OPPOSITE=$([ "$LABEL" = "breaking-change" ] && echo additive-only || echo breaking-change)
            gh pr edit "$EX_NUM" -R "${UI_REPO}" --add-label "$LABEL" || true
            gh pr edit "$EX_NUM" -R "${UI_REPO}" --remove-label "$OPPOSITE" 2>/dev/null || true
          fi

      - name: Cherry-pick by scope and open per-scope PRs
        env:
          STAGED_BRANCH: ${{ needs.detect-drift.outputs.staged_branch }}
          AGENT_BRANCH: ${{ needs.launch-agent.outputs.agent_branch }}
          STAGED_SHA: ${{ steps.checkout.outputs.staged_sha }}
          AGENT_SHA: ${{ steps.checkout.outputs.agent_sha }}
          SOURCE_SHA: ${{ needs.detect-drift.outputs.source_sha }}
          BASE_REF: ${{ needs.detect-drift.outputs.base_ref }}
          ALL_SLUGS: ${{ needs.detect-drift.outputs.all_slugs }}
        run: |
          set -euo pipefail
          cd /tmp/ui-split

          # Build the closed set of allowed Conventional Commit scopes: every slug
          # registered in scripts/myfinance-schema-map.tsv, plus "shared". An agent
          # commit with any other scope is a regression — fail loudly rather than
          # bucket it incorrectly and confuse reviewers.
          declare -A ALLOWED_SCOPES=()
          ALLOWED_SCOPES["shared"]=1
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            ALLOWED_SCOPES["$slug"]=1
          done < <(echo "$ALL_SLUGS" | jq -r '.[]')

          # bash 5.x mis-parses an inline regex with parens here:
          #   if [[ "$sub" =~ ^(type)\(([^)]+)\): ]]
          # produces "syntax error in conditional expression: unexpected token `)'".
          # The fix is to bind the regex to a variable first — bash then defers
          # paren handling to the regex engine where it belongs. The pattern is
          # unchanged.
          conv_scope_regex='^(feat|fix|test|chore|refactor|docs|style|perf|ci|build)\(([^)]+)\):'
          scope_from_subject() {
            local sub="$1"
            if [[ "$sub" =~ $conv_scope_regex ]]; then
              local sc="${BASH_REMATCH[2]}"
              if [ -n "${ALLOWED_SCOPES[$sc]:-}" ]; then
                echo "$sc"
                return 0
              fi
              echo "::error::Commit scope '$sc' is not in the allowed set (TSV slugs + 'shared'). Subject: $sub" >&2
              return 1
            fi
            echo "::error::Commit subject has no Conventional Commit scope: $sub" >&2
            return 1
          }

          SHORT_SHA="${SOURCE_SHA:0:7}"

          # Collect agent commits (exclude merges)
          mapfile -t COMMITS < <(git rev-list --no-merges --reverse "${STAGED_SHA}..${AGENT_SHA}")

          if [ "${#COMMITS[@]}" -eq 0 ]; then
            echo "No commits between staged tip and agent tip — nothing to cherry-pick."
            exit 0
          fi

          # Group commit SHAs by scope, preserving chronological order within
          # each scope. We previously kept this state as a JSON object rebuilt
          # per-iteration via `jq ... '.[$s] = (.[$s] // []) + [$h]'`, but any
          # single jq invocation that emitted non-object output (observed in
          # CI as "Cannot index number with string ...") would corrupt GROUPS
          # for every subsequent iteration. Bash associative arrays remove the
          # cross-iteration JSON dependency entirely.
          declare -A SCOPE_TO_SHAS=()
          SCOPES=()
          for c in "${COMMITS[@]}"; do
            sub=$(git log -1 --format=%s "$c")
            if ! sc=$(scope_from_subject "$sub"); then
              exit 1
            fi
            if [ -z "${SCOPE_TO_SHAS[$sc]+x}" ]; then
              SCOPES+=("$sc")
              SCOPE_TO_SHAS[$sc]=""
            fi
            SCOPE_TO_SHAS[$sc]+="${c}"$'\n'
          done

          echo "Scopes detected: ${SCOPES[*]}"

          FAILURES=0
          FAILED_SCOPES=()
          # Track child branch names within this run so two long scopes that
          # share a 60-char prefix can't silently produce the same branch and
          # have one PR overwrite another.
          declare -A SEEN_CHILD=()
          for sc in "${SCOPES[@]}"; do
            [ -z "$sc" ] && continue
            slug_clean=$(echo "$sc" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
            if [ "${#slug_clean}" -gt 60 ]; then
              # Disambiguate by appending a short hash of the full slug, so
              # `something-very-long-A` and `something-very-long-B` get distinct
              # branches even if their first 60 chars match.
              suffix=$(printf '%s' "$slug_clean" | shasum | cut -c1-6)
              branch_safe="${slug_clean:0:53}-${suffix}"
            else
              branch_safe="$slug_clean"
            fi
            CHILD="sync/myfinance-ui-${SHORT_SHA}-${branch_safe}"
            if [ -n "${SEEN_CHILD[$CHILD]:-}" ]; then
              echo "::error::Branch name collision after truncation: scope '$sc' would produce branch '$CHILD' already used by scope '${SEEN_CHILD[$CHILD]}'. Shorten one of the slugs in scripts/myfinance-schema-map.tsv."
              exit 1
            fi
            SEEN_CHILD["$CHILD"]="$sc"

            mapfile -t SHA_LIST < <(printf '%s' "${SCOPE_TO_SHAS[$sc]}")

            echo ""
            echo "=== Scope: $sc -> branch $CHILD (${#SHA_LIST[@]} commits) ==="

            if [ "${#SHA_LIST[@]}" -eq 0 ]; then
              echo "Skipping empty scope list."
              continue
            fi

            git checkout -B "$CHILD" "origin/${STAGED_BRANCH}"
            ok=true
            for sha in "${SHA_LIST[@]}"; do
              [ -z "$sha" ] && continue
              if ! git cherry-pick "$sha"; then
                echo "::error::Cherry-pick failed for scope=$sc commit=$sha — resolve manually or merge umbrella PR."
                git cherry-pick --abort 2>/dev/null || true
                ok=false
                FAILURES=$((FAILURES + 1))
                FAILED_SCOPES+=("$sc")
                break
              fi
            done

            if [ "$ok" != true ]; then
              git checkout "origin/${STAGED_BRANCH}"
              git branch -D "$CHILD" 2>/dev/null || true
              continue
            fi

            # Same "stale info" guard as in detect-drift: if the child branch
            # already exists on the remote (e.g., re-run), the lease needs an
            # explicit expectation. Otherwise plain push.
            CHILD_EXPECTED=""
            if git fetch "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}.git" "$CHILD" 2>/dev/null; then
              CHILD_EXPECTED=$(git rev-parse FETCH_HEAD)
            fi
            if [ -n "$CHILD_EXPECTED" ]; then
              git push \
                --force-with-lease="refs/heads/$CHILD:$CHILD_EXPECTED" \
                "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}.git" "$CHILD"
            else
              git push "https://x-access-token:${GH_TOKEN}@github.com/${UI_REPO}.git" "$CHILD"
            fi

            PR_TITLE="feat(${sc}): myfinance UI sync (API @ ${SHORT_SHA})"
            if [ "$sc" = "shared" ]; then
              PR_TITLE="chore(shared): cross-cutting myfinance UI sync (API @ ${SHORT_SHA})"
            fi

            COMMIT_LINE=$(printf '%s ' "${SHA_LIST[@]}")

            printf '%s\n' \
              "Automated split from Cloud Agent branch \`${AGENT_BRANCH}\`." \
              "" \
              "- **Scope:** \`${sc}\`" \
              "- **API source SHA:** \`${SOURCE_SHA}\`" \
              "- **Commits:** ${COMMIT_LINE}" \
              "" \
              "_Merge after review. If this PR conflicts with another scope PR, merge \`${STAGED_BRANCH}\` (umbrella) or combine changes manually._" \
              > "$RUNNER_TEMP/child-body.md"
            gh pr create -R "${UI_REPO}" \
              --base "$STAGED_BRANCH" \
              --head "$CHILD" \
              --title "$PR_TITLE" \
              --body-file "$RUNNER_TEMP/child-body.md"
          done

          {
            echo "## PR split (deterministic)"
            echo "- Umbrella: \`$BASE_REF\` <- \`$STAGED_BRANCH\`"
            echo "- Children: \`$STAGED_BRANCH\` <- \`sync/myfinance-ui-${SHORT_SHA}-*\`"
            echo "- Agent branch: \`${AGENT_BRANCH}\`"
            echo "- Scopes: $(printf '%s, ' "${SCOPES[@]}")"
            if [ "${#FAILED_SCOPES[@]}" -gt 0 ]; then
              echo "- **Failed cherry-pick:** $(printf '%s, ' "${FAILED_SCOPES[@]}")"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Hard-fail if any scope failed cherry-pick. Reviewers see red CI;
          # the umbrella PR is still open so the operator can fall back to
          # merging everything together if individual scopes can't be split.
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES scope branch(es) failed cherry-pick; see logs above."
            exit 1
          fi
